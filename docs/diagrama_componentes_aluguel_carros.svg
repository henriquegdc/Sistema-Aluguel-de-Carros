<svg width="100%" viewBox="0 0 680 628" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .layer-bg { fill: #f5f5f2; stroke: #ccc; stroke-dasharray: 5 3; stroke-width: 0.5; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .boundary { fill: none; stroke: #aaa; stroke-dasharray: 8 4; stroke-width: 1; }
  </style>
</defs>

<!-- External actors -->
<g class="c-blue">
  <rect x="55" y="16" width="168" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="139" y="36" text-anchor="middle" dominant-baseline="central">Cliente</text>
  <text class="ts" x="139" y="56" text-anchor="middle" dominant-baseline="central">(Browser)</text>
</g>
<g class="c-green">
  <rect x="458" y="16" width="168" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="542" y="36" text-anchor="middle" dominant-baseline="central">Agente</text>
  <text class="ts" x="542" y="56" text-anchor="middle" dominant-baseline="central">Banco ou Empresa</text>
</g>

<!-- Arrows: actors to system -->
<line x1="139" y1="72" x2="139" y2="100" class="arr"/>
<line x1="542" y1="72" x2="542" y2="100" class="arr"/>

<!-- System boundary -->
<rect x="28" y="84" width="624" height="524" rx="12" class="boundary"/>
<text class="ts" x="340" y="97" text-anchor="middle" fill="#555">«sistema» Aluguel de Carros</text>

<!-- Layer 1: Apresentação -->
<rect x="36" y="102" width="608" height="82" rx="8" class="layer-bg"/>
<text class="ts" x="48" y="115" dominant-baseline="central" fill="#555">Apresentação</text>
<g class="c-teal">
  <rect x="220" y="122" width="240" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Páginas Web Dinâmicas</text>
  <text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">Construção dinâmica (MVC View)</text>
</g>

<!-- Arrow L1 -> L2 -->
<line x1="340" y1="184" x2="340" y2="204" class="arr"/>

<!-- Layer 2: Controladores -->
<rect x="36" y="204" width="608" height="82" rx="8" class="layer-bg"/>
<text class="ts" x="48" y="218" dominant-baseline="central" fill="#555">Controladores (MVC Controller)</text>
<g class="c-purple">
  <rect x="48" y="224" width="186" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="141" y="250" text-anchor="middle" dominant-baseline="central">ClienteController</text>
</g>
<g class="c-purple">
  <rect x="247" y="224" width="186" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="250" text-anchor="middle" dominant-baseline="central">PedidoController</text>
</g>
<g class="c-purple">
  <rect x="446" y="224" width="186" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="539" y="250" text-anchor="middle" dominant-baseline="central">ContratoController</text>
</g>

<!-- Arrow L2 -> L3 -->
<line x1="340" y1="286" x2="340" y2="306" class="arr"/>

<!-- Layer 3: Serviços -->
<rect x="36" y="306" width="608" height="84" rx="8" class="layer-bg"/>
<text class="ts" x="48" y="320" dominant-baseline="central" fill="#555">Serviços (Regras de Negócio)</text>
<g class="c-coral">
  <rect x="48" y="326" width="186" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="141" y="346" text-anchor="middle" dominant-baseline="central">ClienteService</text>
  <text class="ts" x="141" y="364" text-anchor="middle" dominant-baseline="central">CRUD de clientes</text>
</g>
<g class="c-coral">
  <rect x="247" y="326" width="186" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="346" text-anchor="middle" dominant-baseline="central">PedidoService</text>
  <text class="ts" x="340" y="364" text-anchor="middle" dominant-baseline="central">Gestão de pedidos</text>
</g>
<g class="c-coral">
  <rect x="446" y="326" width="186" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="539" y="346" text-anchor="middle" dominant-baseline="central">ContratoService</text>
  <text class="ts" x="539" y="364" text-anchor="middle" dominant-baseline="central">Contratos e análise de crédito</text>
</g>

<!-- Arrow L3 -> L4 -->
<line x1="340" y1="390" x2="340" y2="410" class="arr"/>

<!-- Layer 4: Domínio -->
<rect x="36" y="410" width="608" height="82" rx="8" class="layer-bg"/>
<text class="ts" x="48" y="424" dominant-baseline="central" fill="#555">Domínio (MVC Model)</text>
<g class="c-amber">
  <rect x="48" y="430" width="135" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="456" text-anchor="middle" dominant-baseline="central">Cliente</text>
</g>
<g class="c-amber">
  <rect x="196" y="430" width="135" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="263" y="456" text-anchor="middle" dominant-baseline="central">Pedido</text>
</g>
<g class="c-amber">
  <rect x="344" y="430" width="135" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="411" y="456" text-anchor="middle" dominant-baseline="central">Automóvel</text>
</g>
<g class="c-amber">
  <rect x="492" y="430" width="135" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="559" y="456" text-anchor="middle" dominant-baseline="central">Contrato</text>
</g>

<!-- Layer 5: Infraestrutura -->
<rect x="36" y="508" width="608" height="92" rx="8" class="layer-bg"/>
<text class="ts" x="48" y="522" dominant-baseline="central" fill="#555">Infraestrutura</text>
<g class="c-gray">
  <rect x="48" y="530" width="186" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="141" y="552" text-anchor="middle" dominant-baseline="central">Micronaut / Netty</text>
  <text class="ts" x="141" y="570" text-anchor="middle" dominant-baseline="central">Servidor HTTP (porta 8080)</text>
</g>
<g class="c-gray">
  <rect x="247" y="530" width="186" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="552" text-anchor="middle" dominant-baseline="central">Jackson / Serde</text>
  <text class="ts" x="340" y="570" text-anchor="middle" dominant-baseline="central">Serialização JSON</text>
</g>
<g class="c-gray">
  <rect x="446" y="530" width="186" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="539" y="552" text-anchor="middle" dominant-baseline="central">Logback</text>
  <text class="ts" x="539" y="570" text-anchor="middle" dominant-baseline="central">Logs da aplicação</text>
</g>

<!-- Legend -->
<rect x="48" y="607" width="12" height="12" rx="2" fill="#1D9E75" opacity="0.6"/>
<text class="ts" x="65" y="614" dominant-baseline="central" fill="#555">Apresentação</text>
<rect x="148" y="607" width="12" height="12" rx="2" fill="#7F77DD" opacity="0.6"/>
<text class="ts" x="165" y="614" dominant-baseline="central" fill="#555">Controladores</text>
<rect x="258" y="607" width="12" height="12" rx="2" fill="#D85A30" opacity="0.6"/>
<text class="ts" x="275" y="614" dominant-baseline="central" fill="#555">Serviços</text>
<rect x="340" y="607" width="12" height="12" rx="2" fill="#BA7517" opacity="0.6"/>
<text class="ts" x="357" y="614" dominant-baseline="central" fill="#555">Domínio</text>
<rect x="420" y="607" width="12" height="12" rx="2" fill="#888780" opacity="0.6"/>
<text class="ts" x="437" y="614" dominant-baseline="central" fill="#555">Infraestrutura</text>
</svg>
